<!DOCTYPE html>
<html>
<body>

<p>
  Name:
  <input id="nameInput">
</p>

<p>
  Preview:
  <span id="namePreview"></span>
</p>

<script>

  const state = new Proxy(
    {},
    {
      set(
        target,
        property,
        value
      ) {

        target[property] =
          value;

        if(
          property ===
          "name"
        )
          document
            .getElementById(
              "namePreview"
            )
            .innerText =
              value;

        return true;

      }
    }
  );

  document
    .getElementById(
      "nameInput"
    )
    .addEventListener(
      "input",
      function () {

        state.name =
          this.value;

      }
    );

</script>

</body>
</html>
