<!DOCTYPE html>
<html>
<body>

<p>
  Name:
  <input id="nameInput">
</p>

<p>
  Preview:
  <span id="namePreview"></span>
</p>

<script>

  document
    .getElementById(
      "nameInput"
    )
    .addEventListener(
      "input",
      function () {

        document
          .getElementById(
            "namePreview"
          )
          .innerText =
            this.value;

      }
    );

</script>

</body>
</html>
